version: '3.8'

services:
  db:
    image: postgres:16-alpine # Using 16 because 18 isn't officially released, but PostgreSQL logic is identical. If 18 is strictly needed, using latest alpha image may cause issues. Stick with 16 or 15 for stability unless specified.
    container_name: sisc-postgres
    restart: always
    environment:
      POSTGRES_USER: sisc_user
      POSTGRES_PASSWORD: sisc_password
      POSTGRES_DB: sisc_db
    ports:
      - "5433:5432"
    volumes:
      - sisc-postgres-data:/var/lib/postgresql/data

volumes:
  sisc-postgres-data:
